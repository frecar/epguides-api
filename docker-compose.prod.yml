# =============================================================================
# Production Configuration
# Usage: make up-prod  (or: docker compose -f docker-compose.prod.yml up)
# =============================================================================
# Optimized for 6-core / 5GB server
# Memory: API 1.5GB + Redis 3GB + OS ~500MB = 5GB

services:
  epguides-api:
    build:
      context: .
    # 5 workers = 6 cores - 1 (reserved for Redis + OS)
    # uvloop + httptools: ~2x faster than default asyncio
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 3000
      --workers 5
      --loop uvloop
      --http httptools
      --timeout-keep-alive 30
      --timeout-graceful-shutdown 30
      --limit-concurrency 500
      --backlog 1024
      --log-level warning
    ports:
      - "3000:3000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONOPTIMIZE: "2"
      # Multi-worker prometheus metric aggregation. prometheus_client writes
      # counter state to memory-mapped files in this dir, one per uvicorn
      # worker. The /metrics endpoint reads all files via MultiProcessCollector
      # to return cluster-wide sums. tmpfs is mounted at /tmp (read_only: true
      # on the container's root fs, so an in-image path won't work).
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_BASE_URL: ${API_BASE_URL:-https://epguides.frecar.no}
      LOG_REQUESTS: ${LOG_REQUESTS:-true}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_API_URL: ${LLM_API_URL:-https://llm.carlsen.io/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-auto}
      LLM_ALLOW_EXTERNAL: ${LLM_ALLOW_EXTERNAL:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GIT_SHA: ${GIT_SHA:-}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "5"
          memory: 1536M
        reservations:
          cpus: "2"
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 35s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7
    command: >
      redis-server
      --maxmemory 3gb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --io-threads 2
      --io-threads-do-reads yes
      --tcp-backlog 511
      --tcp-keepalive 300
      --timeout 0
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      - net.core.somaxconn=511
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:size=16M
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
