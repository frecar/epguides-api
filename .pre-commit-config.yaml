repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # mkdocs.yml uses `!!python/name:material.extensions.emoji.twemoji`
        # tags from the mkdocs-material theme — these need unsafe loading.
        args: ['--unsafe']
      - id: check-json
      - id: check-toml
      - id: check-ast
        language_version: python3.14
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: debug-statements
        language_version: python3.14
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Single ruff version of record — keep in lockstep with the
    # [dependency-groups].dev ruff pin (ruff==0.15.15) in pyproject.toml
    # so pre-commit and CI never format/lint against different ruff
    # versions (the classic drift trap).
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Secret-scanning gate. Runs `gitleaks git --pre-commit --redact --staged`
  # over the STAGED diff on every commit and blocks when a credential is
  # detected — prevention against accidentally committing a real secret.
  # Tuning + the known-safe fixture allowlist live in `.gitleaks.toml`
  # (`[extend] useDefault = true`). `language: golang` — pre-commit
  # auto-bootstraps Go, so no host toolchain is required. Stacks with the
  # weaker `detect-private-key` hook above (PEM-only).
  # NEVER bypass with `git commit --no-verify` or `SKIP=gitleaks`.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: update-version
        name: Update version number
        entry: bash -c 'echo $(($(git rev-list --count HEAD) + 1)) > VERSION && git add VERSION'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: tests-coverage
        name: Run tests (95% coverage floor)
        entry: uv run pytest --cov=app --cov-fail-under=95 -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: conventional-commit
        name: Check conventional commit format
        entry: >
          bash -c '
          MSG=$(head -1 "$1");
          if echo "$MSG" | grep -qE "^release"; then exit 0; fi;
          if echo "$MSG" | grep -qE "^Merge "; then exit 0; fi;
          if ! echo "$MSG" | grep -qE "^(feat|fix|refactor|chore|docs|test|ci|perf|style|build|revert|deps)(\(.+\))?(![:]|[:])" ; then
            echo "Commit message must use conventional commit format";
            echo "  Valid prefixes: feat, fix, refactor, chore, docs, test, ci, perf, style, build, revert, deps";
            echo "  Got: $MSG";
            exit 1;
          fi' --
        language: system
        always_run: true
        stages: [commit-msg]

      - id: strip-co-author
        name: Strip Co-Authored-By lines
        entry: bash -c 'sed -i "/^Co-Authored-By:/d" "$1"' --
        language: system
        always_run: true
        stages: [commit-msg]

      - id: no-external-llm
        name: "Configured LLM endpoint check"  # llm-policy: ignore
        entry: python3 scripts/check_no_external_llm.py
        language: system
        pass_filenames: true
        stages: [pre-commit]

      - id: host-python312-syntax
        name: "Host-interpreter syntax guard (Python 3.12)"
        # scripts/ runs under the system `python3` (a developer's machine / CI
        # runner, possibly older than 3.14) via the `language: system` hooks
        # above + `make ci-parity`, NOT the 3.14 `uv` venv. The repo is
        # `requires-python >=3.14` + ruff `target-version=py314`, so the 3.14
        # toolchain (incl. `ruff format`) will emit 3.14-only syntax — e.g.
        # rewrite `except (A, B):` into PEP 758 `except A, B:`, a SyntaxError
        # on Python < 3.14. Compile every host script under a REAL CPython 3.12
        # (`--no-project` sidesteps the >=3.14 gate; py_compile needs only the
        # interpreter grammar). Pairs with the ruff per-file-target-version
        # py312 override in pyproject.toml (the fast lint+format layer).
        entry: uv run --python 3.12 --no-project python -m py_compile
        language: system
        files: ^scripts/.*\.py$
        pass_filenames: true
        stages: [pre-commit]

      - id: no-private-refs
        name: Private reference check
        entry: bash scripts/check-no-internal-refs.sh
        language: system
        pass_filenames: true
        stages: [pre-commit]

      - id: ci-parity
        name: "CI parity — deterministic CI checks"
        # Closes the local-vs-CI check-parity gap. Runs the exact subset of
        # the CI lint/type jobs that is deterministic + locally reproducible
        # from the repo tree (full-tree ruff incl RUF100, mypy, configured-
        # LLM-endpoint lint). Single `make ci-parity` target — one hook, no
        # drift between this list and the CI step set. The 100%-coverage
        # floor is already enforced on every commit by the `tests-coverage`
        # hook above, so it is not duplicated here.
        entry: make ci-parity
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: audit-osv
        name: "Dependency-CVE check (OSV-Scanner vs uv.lock)"
        # Shift-left of the CI "Security Audit" OSV-Scanner job: runs the
        # SAME verdict (--lockfile=uv.lock --config=.osv-scanner.toml)
        # locally at push time so a vulnerable lockfile bump is caught
        # before the push round-trip. DELIBERATELY a separate hook from
        # `ci-parity` above: ci-parity is offline-deterministic and runs
        # the repo tree, whereas OSV needs the osv.dev advisory DB. The
        # wrapper warn-skips (exit 0) when osv-scanner is absent / there's
        # no lockfile / osv.dev is unreachable — so an offline push is
        # NEVER hard-blocked — and hard-fails (exit 1) only when the scan
        # ran and found an un-ignored vulnerability. CI's online OSV job is
        # the authoritative backstop; do NOT silence a finding with
        # --ignore-vuln — bump the dep or add a dated .osv-scanner.toml
        # entry with reason + reviewer + CVSS-tiered ignoreUntil.
        entry: bash scripts/audit_osv.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
