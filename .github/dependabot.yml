version: 2
updates:
  # uv ecosystem — updates pyproject.toml + uv.lock directly (the repo is
  # uv-managed; there is no requirements.txt at the project root for pip
  # to scan).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    # Include transitive deps so CVEs in indirect packages also get auto-PRs.
    allow:
      - dependency-type: "all"
    groups:
      python-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # docker ecosystem — tracks the Dockerfile's `FROM` + `COPY --from` image
  # digests so a pinned `tag@sha256:` stays fresh via a reviewed bump rather
  # than rotting at a frozen digest. Weekly (matching the uv cadence) + grouped
  # into one PR. These bumps are deliberately EXCLUDED from auto-merge (see
  # dependabot-auto-merge.yml): a base/tool-image swap is a supply-chain change
  # that no required check inspects at the image-layer level, so it needs human
  # review before merge.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps"
    groups:
      docker-images:
        patterns:
          - "*"
