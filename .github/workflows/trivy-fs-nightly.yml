name: Trivy fs nightly sweep
# Nightly Trivy fs sweep — catches CVEs published against pinned
# versions since the last PR. Companion to the `trivy-fs` job in
# ci.yml (which gates PR/push). Identical scan, different trigger.
#
# Runs at 03:30 UTC — findings land in the Actions log and (on
# failure) surface via GitHub's default workflow-failure
# notifications without blocking any PR.
#
# `ignore-unfixed: true` suppresses upstream-not-yet-patched noise
# (bumping the dep is the only real remediation, and there is
# nothing to bump to yet).

on:
  schedule:
    - cron: "30 3 * * *"
  # Manual dispatch for ad-hoc re-scans (e.g. after editing
  # .trivyignore to verify the allowlist behaves as intended).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-fs-nightly:
    name: Trivy fs scan (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Two-step gating mirrors the PR-gating job in ci.yml. Unified
      # policy across PR + nightly: CRITICAL gates the workflow run
      # (fails the scheduled job → GitHub notification); HIGH surfaces
      # in log only. Same split keeps the meaning of "the trivy-fs
      # policy" uniform across triggers.
      - name: Trivy fs scan — CRITICAL (gates run)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
      - name: Trivy fs scan — HIGH (annotation only)
        # if: always() ensures a CRITICAL fail above does not hide
        # HIGH findings — see ci.yml comment for the rationale.
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
