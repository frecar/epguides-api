name: uv lock refresh

# Dependabot widens pyproject.toml constraints, but uv.lock isn't regenerated.
# `uv sync --frozen` then keeps installing the OLD locked version even though
# pyproject permits newer. This workflow runs `uv lock --upgrade` weekly and
# opens a PR if anything changed — bringing lock state in line with pyproject
# ceilings.
#
# Scheduled 06:30 UTC Monday — 2.5h after dependabot's 04:00 weekly run
# (defined in .github/dependabot.yml) so the constraint-widening PRs land
# first. The auto-merge workflow approves them on the same cycle; by 06:30
# main has the new pyproject and this workflow opens a follow-up to
# refresh the lock.

on:
  schedule:
    - cron: "30 6 * * 1"   # Monday 06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    # GitHub-hosted: keep this public repo entirely off self-hosted
    # runners. Scheduled lockfile refresh needs only uv + the GitHub API.
    runs-on: ubuntu-latest
    # Bounded ceiling so a wedged runner (hung uv lock network resolve /
    # PR-create API call) fails fast.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need full history so create-pull-request can compute the diff
          # against main correctly when re-running on an existing PR.
          fetch-depth: 0

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Refresh lock against current pyproject
        run: uv lock --upgrade

      - name: Open or update PR if lock changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/uv-lock-refresh
          delete-branch: true
          commit-message: "chore(deps): refresh uv.lock against current constraints"
          title: "chore(deps): refresh uv.lock"
          body: |
            Automated weekly refresh of `uv.lock` to catch up with constraint
            widenings landed by Dependabot since the last run. Opened by
            `.github/workflows/uv-lock-refresh.yml`.

            If this PR is empty (no lock changes), the workflow won't open it
            at all — `create-pull-request` is a no-op when the working tree
            matches main.

            Review notes:
            - Lock-only changes are safe to merge on green CI.
            - If a transitive bump tightens type-stub generics, the
              type-check job will catch it. Fix at the source rather
              than reverting the bump.
          labels: |
            dependencies
            automated
