name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies (including dev for pip-audit)
        run: uv sync --frozen

      - name: Audit
        # No --ignore-vuln entries. All previously-ignored CVEs now have
        # upstream fixes that ship in the lockfile. Anything surfacing
        # here is an actual vuln that needs an upgrade, not a silenced
        # workaround.
        #
        # --skip-editable: `uv sync` installs this project (epguides-api)
        # as an editable install in the venv. pip-audit tries to look up
        # epguides-api on PyPI and fails since it's not published. The
        # flag tells pip-audit to skip such projects — we want third-
        # party CVE coverage, not our own first-party package.
        run: uv run pip-audit --strict --desc --skip-editable

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --frozen --only-dev

      - name: Run ruff check
        run: uv run ruff check app/

      - name: Run ruff format check
        run: uv run ruff format --check app/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy app/ --config-file pyproject.toml --exclude 'app/tests/'

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run pytest --cov=app --cov-fail-under=100 --cov-report=term-missing -q

  ci-gate:
    if: always()
    needs: [audit, lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "CI failed"
            exit 1
          fi
