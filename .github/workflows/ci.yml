name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for the whole workflow. Every
# job here is read-only — checkout, lint, type-check, test, dependency
# audit, Docker build (push: false), and Trivy fs/image scans. None
# post PR comments, push pages, push an image, or cut a release, so no
# job needs a write escalation. The trivy-fs / docker-build /
# trivy-image jobs keep their own explicit `permissions: { contents:
# read }` as documentation; this top-level block makes the read-only
# floor the default for jobs that don't restate it, rather than relying
# on the broad ambient `GITHUB_TOKEN` permissions.
permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    # GitHub-hosted runner. This is a public repo: a fork PR can run
    # arbitrary code in CI, so every pull_request-reachable job runs on an
    # ephemeral, network-isolated GitHub-hosted runner rather than a
    # self-hosted one. The image-build jobs below authenticate their
    # Docker Hub base-image pulls with a read-only token (when available)
    # to avoid the anonymous pull-rate limit on a hosted runner.
    runs-on: ubuntu-latest
    # Bounded ceiling so a wedged self-hosted runner (hung network pull
    # in pip-audit / uv export, or any stuck step) fails the job instead
    # of holding a shared runner for the GitHub default 6h. Sized above
    # normal duration so it only trips on a real hang.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Private reference check
        run: bash scripts/check-no-internal-refs.sh

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Export deps to requirements.txt (third-party only)
        # epguides-api is not published to PyPI, so we can't audit the
        # venv directly (pip-audit errors on the unpublished first-party
        # entry). Export ALL transitive deps to a hashed requirements.txt
        # and audit that file instead — gives us the same third-party
        # CVE coverage without confusing pip-audit.
        run: uv export --frozen --no-dev --no-emit-project --output-file=/tmp/requirements-audit.txt

      - name: Audit
        # No --ignore-vuln entries. All previously-ignored CVEs now have
        # upstream fixes that ship in the lockfile. Anything surfacing
        # here is an actual vuln that needs an upgrade, not a silenced
        # workaround.
        run: uvx pip-audit --strict --desc --require-hashes -r /tmp/requirements-audit.txt

  lint:
    name: Lint
    # GitHub-hosted — public-repo fork-PR isolation (see `audit` above).
    runs-on: ubuntu-latest
    # Bounded ceiling so a wedged runner fails fast instead of holding a
    # shared self-hosted runner for the GitHub default 6h.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --frozen --only-dev

      - name: Run ruff check
        run: uv run ruff check app/

      - name: Run ruff format check
        run: uv run ruff format --check app/

      - name: Configured LLM endpoint check
        run: python3 scripts/check_no_external_llm.py

      - name: Host-interpreter syntax guard (Python 3.12)
        # Everything under scripts/ is run by the system `python3` (a
        # developer's machine / CI runner, possibly older than 3.14) via the
        # `language: system` pre-commit hooks + `make ci-parity`, NOT the 3.14
        # `uv` venv. The repo's `requires-python >=3.14` + ruff
        # `target-version=py314` mean the 3.14 toolchain (and `ruff format`)
        # will happily emit 3.14-only syntax — e.g. rewrite `except (A, B):`
        # into PEP 758 `except A, B:`, which is a SyntaxError on Python < 3.14.
        # This step compiles every host-run script under a real CPython 3.12
        # (`--no-project` sidesteps the `requires-python >=3.14` gate —
        # py_compile needs only the interpreter grammar, no project deps). The
        # ruff `per-file-target-version` py312 override in pyproject.toml is
        # the fast lint+format layer; this is the authoritative compile
        # backstop.
        run: uv run --python 3.12 --no-project python -m py_compile scripts/*.py

  typecheck:
    name: Type Check
    # GitHub-hosted — public-repo fork-PR isolation (see `audit` above).
    runs-on: ubuntu-latest
    # Bounded ceiling so a wedged runner fails fast instead of holding a
    # shared self-hosted runner for the GitHub default 6h.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy app/ --config-file pyproject.toml --exclude 'app/tests/'

  test:
    name: Test
    # GitHub-hosted — public-repo fork-PR isolation (see `audit` above).
    runs-on: ubuntu-latest
    # Bounded ceiling so a wedged runner (or a hung redis service /
    # stuck pytest) fails fast instead of holding a shared self-hosted
    # runner for the GitHub default 6h.
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run pytest --cov=app --cov-fail-under=95 --cov-report=term-missing -q

  # The three jobs below (trivy-fs, docker-build, trivy-image) are a managed
  # copy kept byte-identical to the canonical CI template. Hand-edits between
  # the markers are overwritten by the next template sync; change the canonical
  # template (and re-run the drift check) instead. The drift check compares only
  # the region between the markers, so the rest of this workflow stays freely
  # editable.
  # ===== BEGIN managed-public-ci-template: ci-trivy-buildx — DO NOT HAND-EDIT =====
  # Trivy fs scan. Standalone job here so PR/push runs gate on it via
  # ci-gate. The companion .github/workflows/trivy-fs-nightly.yml owns
  # the 03:30 UTC schedule trigger independently so scheduled sweeps
  # do not conflate with PR signal.
  #
  # Two-step gating: a single step with `severity: "CRITICAL,HIGH"` +
  # `exit-code: "1"` gates on BOTH severities (the `exit-code` applies
  # to ANY finding matching the `severity` filter). Splitting into two
  # steps lets CRITICAL hard-gate and HIGH stay annotation-only:
  #   step 1: severity=CRITICAL, exit-code=1                  → blocks merge
  #   step 2: severity=HIGH, exit-code=0, if: always()        → surfaces findings only
  #
  # `if: always()` on the HIGH step is load-bearing: without it, a
  # CRITICAL failure skips the HIGH-annotation step entirely, which
  # would actually weaken HIGH visibility compared to the previous
  # single-step form.
  trivy-fs:
    name: Trivy fs scan
    # GitHub-hosted — public-repo fork-PR isolation (see `audit` above).
    runs-on: ubuntu-latest
    # Bounded ceiling so a wedged runner (hung Trivy DB pull or stuck
    # scan) fails fast instead of holding a shared self-hosted runner
    # for the GitHub default 6h.
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # Install Trivy into a per-job directory on the runner's local temp
      # space. setup-trivy's default install path ($HOME/.local/bin/trivy-bin)
      # is shared across concurrent jobs on a self-hosted runner host, so one
      # job writing the binary while another execs it raises ETXTBSY ("Text
      # file busy", exit 126). ${{ runner.temp }} is unique per job and on
      # local disk, so there is no shared write/exec target to race on.
      - name: Install Trivy (per-job, isolated binary)
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0 # keep in sync with aquasecurity/trivy-action@v0.36.0
          cache: true
          path: ${{ runner.temp }}
      - name: Put the per-job Trivy on PATH
        run: echo "${{ runner.temp }}/trivy-bin" >> "$GITHUB_PATH"
      - name: Trivy fs scan — CRITICAL (gates merge)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"
          # Suppress findings with no upstream fix available — those
          # are noise we cannot act on (`bump the dep` is the only
          # real remediation, and there is nothing to bump to).
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
      - name: Trivy fs scan — HIGH (annotation only)
        # `if: always()` so a CRITICAL failure above does not suppress
        # HIGH visibility — policy is "CRITICAL gates, HIGH informs",
        # not "CRITICAL gates, HIGH only-shown-when-clean".
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "fs"
          scan-ref: "."
          # exit-code=0 — HIGH surfaces in the run log but does NOT
          # gate. Avoids base-image noise creating bypass culture.
          severity: "HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"

  # Build the production image in CI. Without this, the multi-stage
  # Dockerfile is only syntax-linted by hadolint — an actual build
  # regression (a base-image tag that no longer resolves, a broken
  # `uv sync`, a COPY path that drifts after a refactor) would merge
  # silently and only surface on the next deploy rebuild. This job
  # gates every PR on a real `docker build` of the runtime target.
  #
  # The build is BuildKit-cached via GitHub Actions cache so the cost
  # stays bounded: a Dockerfile/lockfile-stable PR is a near-instant
  # cache hit; only dependency or base-image changes pay the cold-build
  # cost. `load: true` is omitted here (this job only needs to prove the
  # build succeeds, not export the image) — the trivy-image job below
  # loads it for scanning off the same shared cache.
  docker-build:
    name: Docker build
    # GitHub-hosted — public-repo fork-PR isolation (see `audit` above).
    runs-on: ubuntu-latest
    # Bounded ceiling — primary wedge-stopper. The buildx bootstrap
    # pull (moby/buildkit) and in-build FROM-base pulls can hang on a
    # registry rate-limit / network stall. 25m sits well above a normal
    # cached build (sub-3min) so it only trips on a real hang.
    timeout-minutes: 25
    permissions:
      contents: read
    # Lift the Docker Hub token into a job-level env var so the login step
    # can gate on its presence. The `secrets` context is NOT permitted in
    # an `if:` expression, but `env` is — and on fork PRs (no secrets) the
    # var resolves to an empty string, so the guard skips login cleanly.
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # Authenticate to Docker Hub BEFORE buildx is created. The buildx
      # docker-container driver does NOT inherit the host daemon's registry
      # config, so base-image resolution (`FROM python:3.14-slim`) otherwise
      # hits Docker Hub anonymously and is rate-limited (HTTP 429) once the
      # BuildKit cache misses. An authenticated pull raises the rate limit
      # well above the anonymous ceiling. setup-buildx-action reads the
      # credentials login writes to the runner's docker config at
      # builder-create time and propagates them into the container builder,
      # so login MUST precede the buildx step.
      #
      # Guarded on a non-empty token so fork PRs — which GitHub never grants
      # secrets — degrade cleanly to an anonymous pull instead of erroring
      # on an empty credential.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build runtime image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          target: runtime
          push: false
          load: false
          tags: epguides-api:ci
          cache-from: type=gha,scope=docker-image
          # ignore-error=true: the GitHub Actions Cache API is rate-limited,
          # so under concurrent CI load the mode=max cache *export* RPC can
          # stall and the buildkit builder is torn down mid-export (goaway
          # NO_ERROR / "graceful_stop"), failing the job even though the image
          # built fine. The cache write-back is a non-load-bearing build-time
          # optimisation, so a failed export must not fail the build.
          # ignore-error is a documented type=gha cache-to boolean.
          cache-to: type=gha,mode=max,scope=docker-image,ignore-error=true

  # Trivy image scan. Orthogonal to trivy-fs above: `fs` scans the repo's
  # manifests and lockfiles; `image` scans the BUILT image — the
  # base-image OS package layer (python:3.14-slim) plus the installed
  # virtualenv. Without this, base-image CVEs are invisible to CI.
  #
  # This job rebuilds the runtime image, but off the SAME GitHub Actions
  # BuildKit cache the docker-build job populated, so the second build is
  # a cache hit and the extra cost is the image load + scan, not a full
  # rebuild. `load: true` puts the image in the local Docker daemon so
  # `trivy image` can read it.
  #
  # Two-step gating mirrors the trivy-fs job exactly:
  #   step 1: severity=CRITICAL, exit-code=1                  → blocks merge
  #   step 2: severity=HIGH, exit-code=0, if: always()        → surfaces findings only
  #
  # `if: always()` on the HIGH step is load-bearing: without it, a
  # CRITICAL failure skips the HIGH-annotation step entirely, which
  # would weaken HIGH visibility.
  trivy-image:
    name: Trivy image scan
    # GitHub-hosted — public-repo fork-PR isolation (see `audit` above).
    runs-on: ubuntu-latest
    # Bounded ceiling — this job both builds the image (same buildx
    # bootstrap / FROM-base pull hang risk as docker-build) and loads +
    # scans it. 25m sits above a normal cached build + scan.
    timeout-minutes: 25
    permissions:
      contents: read
    # See docker-build: `secrets` is not allowed in `if:`, so the token is
    # lifted to job-level env for the login guard. Empty on fork PRs →
    # login skipped, anonymous pull.
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # Install Trivy into a per-job directory on the runner's local temp
      # space. setup-trivy's default install path ($HOME/.local/bin/trivy-bin)
      # is shared across concurrent jobs on a self-hosted runner host, so one
      # job writing the binary while another execs it raises ETXTBSY ("Text
      # file busy", exit 126). ${{ runner.temp }} is unique per job and on
      # local disk, so there is no shared write/exec target to race on.
      - name: Install Trivy (per-job, isolated binary)
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0 # keep in sync with aquasecurity/trivy-action@v0.36.0
          cache: true
          path: ${{ runner.temp }}
      - name: Put the per-job Trivy on PATH
        run: echo "${{ runner.temp }}/trivy-bin" >> "$GITHUB_PATH"
      # Authenticate to Docker Hub before buildx is created — same reason
      # as the docker-build job: the docker-container driver pulls base
      # images anonymously and is 429-rate-limited on a cache miss without
      # this. Login MUST precede setup-buildx-action so the credentials
      # propagate into the container builder. Fork-PR-safe via the token
      # guard (empty token → anonymous pull).
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build runtime image (cached, loaded for scan)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          target: runtime
          push: false
          load: true
          tags: epguides-api:scan
          cache-from: type=gha,scope=docker-image
          # ignore-error=true: the GitHub Actions Cache API is rate-limited,
          # so under concurrent CI load the mode=max cache *export* RPC can
          # stall and the buildkit builder is torn down mid-export (goaway
          # NO_ERROR / "graceful_stop"), failing the job even though the image
          # built fine. The cache write-back is a non-load-bearing build-time
          # optimisation, so a failed export must not fail the build.
          # ignore-error is a documented type=gha cache-to boolean.
          cache-to: type=gha,mode=max,scope=docker-image,ignore-error=true
      - name: Trivy image scan — CRITICAL (gates merge)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "image"
          image-ref: "epguides-api:scan"
          severity: "CRITICAL"
          exit-code: "1"
          # Suppress findings with no upstream fix available — those
          # are noise we cannot act on (`bump the base image` does not
          # always have a target). Mirrors the trivy-fs policy.
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore.image"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
      - name: Trivy image scan — HIGH (annotation only)
        # `if: always()` so a CRITICAL failure above does not suppress
        # HIGH visibility — policy is "CRITICAL gates, HIGH informs",
        # not "CRITICAL gates, HIGH only-shown-when-clean".
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "image"
          image-ref: "epguides-api:scan"
          # exit-code=0 — HIGH surfaces in the run log but does NOT
          # gate. Avoids base-image noise creating bypass culture.
          severity: "HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore.image"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
  # ===== END managed-public-ci-template: ci-trivy-buildx =====

  gitleaks:
    # Server-side secret-scanning BACKSTOP to the local `gitleaks` pre-commit
    # hook. The local hook scans the STAGED diff at commit time but is
    # bypassable (`git commit --no-verify`, `SKIP=gitleaks`, commenting out the
    # hook); this job re-runs gitleaks on the PR so a bypassed local hook is
    # still caught before merge. It reuses the SAME vendored `.gitleaks.toml`
    # (no CI-vs-local divergence) and is wired into `ci-gate` below so a
    # detected secret blocks the merge.
    #
    # NOT path-filtered — it always runs, so it never reports `skipped` and is
    # safe in ci-gate's `needs` regardless of which files a PR touches.
    #
    # SCOPE = PR-diff range, not full-tree: the gate catches a NEWLY-introduced
    # secret. A pre-existing committed secret must be rotated, not turned into
    # an unrelated-PR blocker. A periodic full-history sweep is a separate
    # concern.
    #
    # IMPLEMENTATION = pinned CLI binary from GitHub Releases (version +
    # SHA256), NOT `gitleaks/gitleaks-action`: the Docker action pulls an image
    # (Docker-Hub pull-rate-limit pain) and trips org-license checks. The scan
    # itself is a local git op — no network once the binary is in place.
    #
    # GitHub-hosted — public-repo fork-PR isolation (see `audit` above).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history so the PR base commit is present for the range scan.
          fetch-depth: 0

      - name: Install pinned gitleaks
        # v8.30.1 matches the `gitleaks/gitleaks` `rev` pinned in
        # .pre-commit-config.yaml — keep the two in lockstep so CI == local.
        # When bumping the hook, bump GITLEAKS_VERSION + GITLEAKS_SHA256 here in
        # the same PR (SHA256 = linux_x64 tarball digest from checksums.txt).
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          tmp="$(mktemp -d)"
          curl -fsSL --retry 3 -o "${tmp}/${tarball}" "${url}"
          echo "${GITLEAKS_SHA256}  ${tmp}/${tarball}" | sha256sum -c -
          tar -xzf "${tmp}/${tarball}" -C "${tmp}" gitleaks
          install -m 0755 "${tmp}/gitleaks" "${RUNNER_TEMP}/gitleaks"
          echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"
          rm -rf "${tmp}"

      - name: Scan PR diff for secrets
        # Range = base..head on pull_request, before..after on push to main.
        # Use head.sha (NOT github.sha, the synthetic merge commit on PR events)
        # so we scan exactly the contributor's commits. On a push whose `before`
        # is the zero-SHA (new branch / first push / force-push to an unknown
        # parent), fall back to scanning HEAD's working tree so the gate never
        # silently no-ops.
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          GH_EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          common=(--config .gitleaks.toml --redact --no-banner --verbose)
          if [ "${GH_EVENT}" = "pull_request" ]; then
            echo "Scanning PR range ${PR_BASE_SHA}..${PR_HEAD_SHA}"
            gitleaks git "${common[@]}" --log-opts="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [ "${GH_EVENT}" = "push" ] && [ -n "${PUSH_BEFORE}" ] \
               && [ "${PUSH_BEFORE}" != "0000000000000000000000000000000000000000" ] \
               && git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
            echo "Scanning push range ${PUSH_BEFORE}..${GITHUB_SHA}"
            gitleaks git "${common[@]}" --log-opts="${PUSH_BEFORE}..${GITHUB_SHA}"
          else
            echo "No usable base commit (new branch / first push); scanning working tree"
            gitleaks dir . "${common[@]}"
          fi

  # Aggregate gate. This is the single required check
  # branch protection keys off, so it must run on EVERY outcome and
  # treat ANYTHING that is not a clean success across all `needs` jobs
  # as a hard fail. `if: always()` guarantees the gate itself always
  # runs and reports a definitive pass/fail status (a job that is
  # itself skipped reports `skipped`, which some branch-protection
  # configs mis-read as success — so the gate must never be allowed to
  # skip).
  #
  # The assertion catches all three non-success `needs.*.result`
  # values, because `contains(needs.*.result, 'failure')` alone is the
  # classic GitHub Actions gating foot-gun:
  #   - `failure`   — a job failed outright.
  #   - `cancelled` — runner killed mid-run, or a concurrency cancel
  #     landed. A cancelled job never reports `failure`, so a
  #     `failure`-only gate would go green while a mandatory check did
  #     not actually pass.
  #   - `skipped`   — an upstream `needs` dependency did not run (e.g.
  #     its own dependency was cancelled, cascading a skip). A skipped
  #     required job is NOT a passed one, so the gate fails on it too.
  #
  # None of the seven `needs` jobs has an `if:` condition today, so a
  # skipped result is not expected in normal operation — but asserting
  # on it is the deny-by-default posture and stays correct if a future
  # change adds a conditional job.
  ci-gate:
    if: always()
    needs: [audit, lint, typecheck, test, trivy-fs, docker-build, trivy-image, gitleaks]
    # GitHub-hosted — public-repo fork-PR isolation (see `audit` above).
    runs-on: ubuntu-latest
    # Bounded ceiling — this gate only checks `needs.*.result` and exits,
    # so it should finish in seconds.
    timeout-minutes: 10
    steps:
      - name: Assert all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "CI failed: one or more required jobs did not succeed."
          echo "Results: ${{ join(needs.*.result, ', ') }}"
          exit 1
