name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for the whole workflow. Every
# job here is read-only — checkout, lint, type-check, test, dependency
# audit, Docker build (push: false), and Trivy fs/image scans. None
# post PR comments, push pages, push an image, or cut a release, so no
# job needs a write escalation. The trivy-fs / docker-build /
# trivy-image jobs keep their own explicit `permissions: { contents:
# read }` as documentation; this top-level block makes the read-only
# floor the default for jobs that don't restate it, rather than relying
# on the broad ambient `GITHUB_TOKEN` permissions.
permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    steps:
      - uses: actions/checkout@v6

      - name: Private reference check
        run: bash scripts/check-no-internal-refs.sh

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Export deps to requirements.txt (third-party only)
        # epguides-api is not published to PyPI, so we can't audit the
        # venv directly (pip-audit errors on the unpublished first-party
        # entry). Export ALL transitive deps to a hashed requirements.txt
        # and audit that file instead — gives us the same third-party
        # CVE coverage without confusing pip-audit.
        run: uv export --frozen --no-dev --no-emit-project --output-file=/tmp/requirements-audit.txt

      - name: Audit
        # No --ignore-vuln entries. All previously-ignored CVEs now have
        # upstream fixes that ship in the lockfile. Anything surfacing
        # here is an actual vuln that needs an upgrade, not a silenced
        # workaround.
        run: uvx pip-audit --strict --desc --require-hashes -r /tmp/requirements-audit.txt

  lint:
    name: Lint
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    steps:
      - uses: actions/checkout@v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --frozen --only-dev

      - name: Run ruff check
        run: uv run ruff check app/

      - name: Run ruff format check
        run: uv run ruff format --check app/

      - name: Configured LLM endpoint check
        run: python3 scripts/check_no_external_llm.py

  typecheck:
    name: Type Check
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    steps:
      - uses: actions/checkout@v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy app/ --config-file pyproject.toml --exclude 'app/tests/'

  test:
    name: Test
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run pytest --cov=app --cov-fail-under=100 --cov-report=term-missing -q

  # Trivy fs scan. Standalone job here so PR/push runs gate on it via
  # ci-gate. The companion .github/workflows/trivy-fs-nightly.yml owns
  # the 03:30 UTC schedule trigger independently so scheduled sweeps
  # do not conflate with PR signal.
  #
  # Two-step gating: a single step with `severity: "CRITICAL,HIGH"` +
  # `exit-code: "1"` gates on BOTH severities (the `exit-code` applies
  # to ANY finding matching the `severity` filter). Splitting into two
  # steps lets CRITICAL hard-gate and HIGH stay annotation-only:
  #   step 1: severity=CRITICAL, exit-code=1                  → blocks merge
  #   step 2: severity=HIGH, exit-code=0, if: always()        → surfaces findings only
  #
  # `if: always()` on the HIGH step is load-bearing: without it, a
  # CRITICAL failure skips the HIGH-annotation step entirely, which
  # would actually weaken HIGH visibility compared to the previous
  # single-step form.
  trivy-fs:
    name: Trivy fs scan
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # Install Trivy into a per-job directory on the runner's local temp
      # space. setup-trivy's default install path ($HOME/.local/bin/trivy-bin)
      # is shared across concurrent jobs on a self-hosted runner host, so one
      # job writing the binary while another execs it raises ETXTBSY ("Text
      # file busy", exit 126). ${{ runner.temp }} is unique per job and on
      # local disk, so there is no shared write/exec target to race on.
      - name: Install Trivy (per-job, isolated binary)
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0 # keep in sync with aquasecurity/trivy-action@v0.36.0
          cache: true
          path: ${{ runner.temp }}
      - name: Put the per-job Trivy on PATH
        run: echo "${{ runner.temp }}/trivy-bin" >> "$GITHUB_PATH"
      - name: Trivy fs scan — CRITICAL (gates merge)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"
          # Suppress findings with no upstream fix available — those
          # are noise we cannot act on (`bump the dep` is the only
          # real remediation, and there is nothing to bump to).
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
      - name: Trivy fs scan — HIGH (annotation only)
        # `if: always()` so a CRITICAL failure above does not suppress
        # HIGH visibility — policy is "CRITICAL gates, HIGH informs",
        # not "CRITICAL gates, HIGH only-shown-when-clean".
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "fs"
          scan-ref: "."
          # exit-code=0 — HIGH surfaces in the run log but does NOT
          # gate. Avoids base-image noise creating bypass culture.
          severity: "HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"

  # Build the production image in CI. Without this, the multi-stage
  # Dockerfile is only syntax-linted by hadolint — an actual build
  # regression (a base-image tag that no longer resolves, a broken
  # `uv sync`, a COPY path that drifts after a refactor) would merge
  # silently and only surface on the next deploy rebuild. This job
  # gates every PR on a real `docker build` of the runtime target.
  #
  # The build is BuildKit-cached via GitHub Actions cache so the cost
  # stays bounded: a Dockerfile/lockfile-stable PR is a near-instant
  # cache hit; only dependency or base-image changes pay the cold-build
  # cost. `load: true` is omitted here (this job only needs to prove the
  # build succeeds, not export the image) — the trivy-image job below
  # loads it for scanning off the same shared cache.
  docker-build:
    name: Docker build
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    permissions:
      contents: read
    # Lift the Docker Hub token into a job-level env var so the login step
    # can gate on its presence. The `secrets` context is NOT permitted in
    # an `if:` expression, but `env` is — and on fork PRs (no secrets) the
    # var resolves to an empty string, so the guard skips login cleanly.
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      # Authenticate to Docker Hub BEFORE buildx is created. The buildx
      # docker-container driver does NOT inherit the host daemon's
      # registry config, so base-image resolution (`FROM python:3.14-slim`,
      # `FROM ghcr.io/astral-sh/uv`) otherwise hits Docker Hub anonymously
      # and is rate-limited (HTTP 429) once the BuildKit cache misses.
      # An authenticated pull raises the Docker Hub rate limit well above
      # the anonymous ceiling, removing the 429. setup-buildx-action reads
      # the credentials login writes to the runner's docker config at
      # builder-create time and propagates them into the container builder,
      # so login MUST precede the buildx step.
      #
      # Guarded on a non-empty token so fork PRs — which GitHub never grants
      # secrets — degrade cleanly to an anonymous pull instead of erroring
      # on an empty credential. No registry hostname is committed, so the
      # public-reference guard stays green.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build runtime image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          load: false
          tags: epguides-api:ci
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image

  # Trivy image scan. Orthogonal to trivy-fs above: `fs` scans the repo's
  # manifests and lockfiles; `image` scans the BUILT image — the
  # base-image OS package layer (python:3.14-slim) plus the installed
  # virtualenv. Without this, base-image CVEs are invisible to CI.
  #
  # This job rebuilds the runtime image, but off the SAME GitHub Actions
  # BuildKit cache the docker-build job populated, so the second build is
  # a cache hit and the extra cost is the image load + scan, not a full
  # rebuild. `load: true` puts the image in the local Docker daemon so
  # `trivy image` can read it.
  #
  # Two-step gating mirrors the trivy-fs job exactly:
  #   step 1: severity=CRITICAL, exit-code=1                  → blocks merge
  #   step 2: severity=HIGH, exit-code=0, if: always()        → surfaces findings only
  #
  # `if: always()` on the HIGH step is load-bearing: without it, a
  # CRITICAL failure skips the HIGH-annotation step entirely, which
  # would weaken HIGH visibility.
  trivy-image:
    name: Trivy image scan
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    permissions:
      contents: read
    # See docker-build job: `secrets` is not allowed in `if:`, so the
    # token is lifted to job-level env for the login guard. Empty on
    # fork PRs → login skipped, anonymous pull.
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      # Install Trivy into a per-job directory on the runner's local temp
      # space. setup-trivy's default install path ($HOME/.local/bin/trivy-bin)
      # is shared across concurrent jobs on a self-hosted runner host, so one
      # job writing the binary while another execs it raises ETXTBSY ("Text
      # file busy", exit 126). ${{ runner.temp }} is unique per job and on
      # local disk, so there is no shared write/exec target to race on.
      - name: Install Trivy (per-job, isolated binary)
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0 # keep in sync with aquasecurity/trivy-action@v0.36.0
          cache: true
          path: ${{ runner.temp }}
      - name: Put the per-job Trivy on PATH
        run: echo "${{ runner.temp }}/trivy-bin" >> "$GITHUB_PATH"
      # Authenticate to Docker Hub before buildx is created — same reason
      # as the docker-build job: the docker-container driver pulls base
      # images anonymously and is 429-rate-limited on a cache miss without
      # this. Login MUST precede setup-buildx-action so the credentials
      # propagate into the container builder. Fork-PR-safe via the token
      # guard; no registry hostname is committed.
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build runtime image (cached, loaded for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          load: true
          tags: epguides-api:scan
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
      - name: Trivy image scan — CRITICAL (gates merge)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "image"
          image-ref: "epguides-api:scan"
          severity: "CRITICAL"
          exit-code: "1"
          # Suppress findings with no upstream fix available — those
          # are noise we cannot act on (`bump the base image` does not
          # always have a target). Mirrors the trivy-fs policy.
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore.image"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
      - name: Trivy image scan — HIGH (annotation only)
        # `if: always()` so a CRITICAL failure above does not suppress
        # HIGH visibility — policy is "CRITICAL gates, HIGH informs",
        # not "CRITICAL gates, HIGH only-shown-when-clean".
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "image"
          image-ref: "epguides-api:scan"
          # exit-code=0 — HIGH surfaces in the run log but does NOT
          # gate. Avoids base-image noise creating bypass culture.
          severity: "HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore.image"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"

  # Aggregate gate. This is the single required check
  # branch protection keys off, so it must run on EVERY outcome and
  # treat ANYTHING that is not a clean success across all `needs` jobs
  # as a hard fail. `if: always()` guarantees the gate itself always
  # runs and reports a definitive pass/fail status (a job that is
  # itself skipped reports `skipped`, which some branch-protection
  # configs mis-read as success — so the gate must never be allowed to
  # skip).
  #
  # The assertion catches all three non-success `needs.*.result`
  # values, because `contains(needs.*.result, 'failure')` alone is the
  # classic GitHub Actions gating foot-gun:
  #   - `failure`   — a job failed outright.
  #   - `cancelled` — runner killed mid-run, or a concurrency cancel
  #     landed. A cancelled job never reports `failure`, so a
  #     `failure`-only gate would go green while a mandatory check did
  #     not actually pass.
  #   - `skipped`   — an upstream `needs` dependency did not run (e.g.
  #     its own dependency was cancelled, cascading a skip). A skipped
  #     required job is NOT a passed one, so the gate fails on it too.
  #
  # None of the seven `needs` jobs has an `if:` condition today, so a
  # skipped result is not expected in normal operation — but asserting
  # on it is the deny-by-default posture and stays correct if a future
  # change adds a conditional job.
  ci-gate:
    if: always()
    needs: [audit, lint, typecheck, test, trivy-fs, docker-build, trivy-image]
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    steps:
      - name: Assert all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "CI failed: one or more required jobs did not succeed."
          echo "Results: ${{ join(needs.*.result, ', ') }}"
          exit 1
