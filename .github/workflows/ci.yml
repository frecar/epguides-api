name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Security Audit
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    steps:
      - uses: actions/checkout@v6

      - name: Private reference check
        run: bash scripts/check-no-internal-refs.sh

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Export deps to requirements.txt (third-party only)
        # epguides-api is not published to PyPI, so we can't audit the
        # venv directly (pip-audit errors on the unpublished first-party
        # entry). Export ALL transitive deps to a hashed requirements.txt
        # and audit that file instead — gives us the same third-party
        # CVE coverage without confusing pip-audit.
        run: uv export --frozen --no-dev --no-emit-project --output-file=/tmp/requirements-audit.txt

      - name: Audit
        # No --ignore-vuln entries. All previously-ignored CVEs now have
        # upstream fixes that ship in the lockfile. Anything surfacing
        # here is an actual vuln that needs an upgrade, not a silenced
        # workaround.
        run: uvx pip-audit --strict --desc --require-hashes -r /tmp/requirements-audit.txt

  lint:
    name: Lint
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    steps:
      - uses: actions/checkout@v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --frozen --only-dev

      - name: Run ruff check
        run: uv run ruff check app/

      - name: Run ruff format check
        run: uv run ruff format --check app/

      - name: Configured LLM endpoint check
        run: python3 scripts/check_no_external_llm.py

  typecheck:
    name: Type Check
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    steps:
      - uses: actions/checkout@v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy app/ --config-file pyproject.toml --exclude 'app/tests/'

  test:
    name: Test
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Isolate uv cache
        run: |
          echo "UV_CACHE_DIR=${RUNNER_TEMP}/uv-cache" >> "$GITHUB_ENV"
          echo "UV_PYTHON_INSTALL_DIR=${RUNNER_TEMP}/uv-python" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: uv run pytest --cov=app --cov-fail-under=100 --cov-report=term-missing -q

  # Trivy fs scan. Standalone job here so PR/push runs gate on it via
  # ci-gate. The companion .github/workflows/trivy-fs-nightly.yml owns
  # the 03:30 UTC schedule trigger independently so scheduled sweeps
  # do not conflate with PR signal.
  #
  # Two-step gating: a single step with `severity: "CRITICAL,HIGH"` +
  # `exit-code: "1"` gates on BOTH severities (the `exit-code` applies
  # to ANY finding matching the `severity` filter). Splitting into two
  # steps lets CRITICAL hard-gate and HIGH stay annotation-only:
  #   step 1: severity=CRITICAL, exit-code=1                  → blocks merge
  #   step 2: severity=HIGH, exit-code=0, if: always()        → surfaces findings only
  #
  # `if: always()` on the HIGH step is load-bearing: without it, a
  # CRITICAL failure skips the HIGH-annotation step entirely, which
  # would actually weaken HIGH visibility compared to the previous
  # single-step form.
  trivy-fs:
    name: Trivy fs scan
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # Install Trivy into a per-job directory on the runner's local temp
      # space. setup-trivy's default install path ($HOME/.local/bin/trivy-bin)
      # is shared across concurrent jobs on a self-hosted runner host, so one
      # job writing the binary while another execs it raises ETXTBSY ("Text
      # file busy", exit 126). ${{ runner.temp }} is unique per job and on
      # local disk, so there is no shared write/exec target to race on.
      - name: Install Trivy (per-job, isolated binary)
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0 # keep in sync with aquasecurity/trivy-action@v0.36.0
          cache: true
          path: ${{ runner.temp }}
      - name: Put the per-job Trivy on PATH
        run: echo "${{ runner.temp }}/trivy-bin" >> "$GITHUB_PATH"
      - name: Trivy fs scan — CRITICAL (gates merge)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"
          # Suppress findings with no upstream fix available — those
          # are noise we cannot act on (`bump the dep` is the only
          # real remediation, and there is nothing to bump to).
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"
      - name: Trivy fs scan — HIGH (annotation only)
        # `if: always()` so a CRITICAL failure above does not suppress
        # HIGH visibility — policy is "CRITICAL gates, HIGH informs",
        # not "CRITICAL gates, HIGH only-shown-when-clean".
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          skip-setup-trivy: true # use the per-job Trivy installed above
          scan-type: "fs"
          scan-ref: "."
          # exit-code=0 — HIGH surfaces in the run log but does NOT
          # gate. Avoids base-image noise creating bypass culture.
          severity: "HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "table"
          trivyignores: ".trivyignore"
        env:
          TRIVY_DISABLE_VEX_NOTICE: "true"

  ci-gate:
    if: always()
    needs: [audit, lint, typecheck, test, trivy-fs]
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    steps:
      - run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "CI failed"
            exit 1
          fi
