name: Dockerfile hygiene

# Lints the production Dockerfile via hadolint
# (https://github.com/hadolint/hadolint) to catch common anti-patterns
# (unpinned `:latest` bases, mutable apt installs without
# `--no-install-recommends`, missing healthcheck, running as root,
# `ADD` vs `COPY`, etc.).
#
# `failure-threshold: error` keeps CI red only on real problems. Style
# / info / warning findings show up as PR annotations without blocking
# merges - the right friction tier for an established Dockerfile.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hadolint:
    name: hadolint
    runs-on: [self-hosted, Linux, X64, cluster-ci]
    # Bounded ceiling so a wedged self-hosted runner fails fast instead
    # of holding a shared runner for the GitHub default 6h. hadolint is
    # a fast lint; 15m only trips on a real hang.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run hadolint
        # Pinned to a specific version for supply-chain safety; bump
        # deliberately when upstream releases security-relevant patches.
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ./Dockerfile
          recursive: false
          failure-threshold: error
          format: json
          no-fail: false
